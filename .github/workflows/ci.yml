name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # needed to publish a Release on tag builds

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Unit tests (host)
        run: pio test -e native

      - name: Build KNOMI V1
        run: pio run -e knomiv1

      - name: Build KNOMI V2
        run: pio run -e knomiv2

      - name: Collect firmware
        run: |
          mkdir -p dist
          cp .pio/build/knomiv1/firmware.bin dist/knomi-v1-firmware.bin
          cp .pio/build/knomiv2/firmware.bin dist/knomi-v2-firmware.bin

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/*.bin

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG" dist/*.bin \
            --title "$TAG" \
            --notes "Automated build of \`$TAG\`.

          **Flash over the network:** open \`http://<knomi-ip>/update\` (or \`http://KNOMI.local/update\`) and upload the \`.bin\` for your board — no USB needed (the stock BTT partition layout/OTA endpoint is compatible). First boot resets stored config, so re-enter WiFi via the \`BTT-KNOMI\` access point.

          | File | Board |
          | --- | --- |
          | \`knomi-v1-firmware.bin\` | KNOMI V1 (ESP32-WROOM) |
          | \`knomi-v2-firmware.bin\` | KNOMI V2 (ESP32-S3) |

          See the README for what's new: https://github.com/$REPO#readme"
